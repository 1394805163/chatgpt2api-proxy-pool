services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:proxy-pool
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "${CHATGPT2API_PORT:-3000}:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-json}
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-12345678}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
