services:
  - type: web
    name: chatgpt2api-free-test
    runtime: docker
    plan: free
    region: singapore
    branch: dev
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health?format=json
    autoDeployTrigger: off
    envVars:
      - key: PORT
        value: "80"
      - key: STORAGE_BACKEND
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: CHATGPT2API_AUTH_KEY
        sync: false
