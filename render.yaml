services:
  - type: web
    name: chatgpt2api-free-test
    runtime: docker
    plan: free
    region: singapore
    branch: codex/render-free-test
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health?format=json
    autoDeployTrigger: off
    envVars:
      - key: PORT
        value: "80"
      - key: STORAGE_BACKEND
        value: json
      - key: CHATGPT2API_AUTH_KEY
        sync: false
